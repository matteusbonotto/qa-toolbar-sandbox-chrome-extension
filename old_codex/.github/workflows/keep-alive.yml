name: Supabase keep-alive

on:
  schedule:
    - cron: "17 8 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call protected health endpoint
        env:
          KEEP_ALIVE_URL: ${{ secrets.SUPABASE_KEEP_ALIVE_URL }}
          KEEP_ALIVE_SECRET: ${{ secrets.SUPABASE_KEEP_ALIVE_SECRET }}
        run: |
          test -n "$KEEP_ALIVE_URL"
          test -n "$KEEP_ALIVE_SECRET"
          curl --fail --silent --show-error \
            --request POST \
            --header "x-keep-alive-secret: $KEEP_ALIVE_SECRET" \
            --header "content-type: application/json" \
            --data '{}' \
            "$KEEP_ALIVE_URL"
