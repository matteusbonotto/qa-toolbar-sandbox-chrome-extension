project_id = "qa-toolbar-sandbox"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 17

[auth]
enabled = true
site_url = "https://matteusbonotto.github.io/qa-toolbar-sandbox-chrome-extension/"
additional_redirect_urls = [
  "https://matteusbonotto.github.io/qa-toolbar-sandbox-chrome-extension/**",
  "http://localhost:3000/**",
  "http://localhost:5173/**",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage.vector]
enabled = false

[functions.stripe-webhook]
verify_jwt = false

[functions.auth-sign-in]
verify_jwt = false

[functions.auth-refresh]
verify_jwt = false

[functions.auth-sign-up]
verify_jwt = false

[functions.keep-alive]
verify_jwt = false

[functions.checkout-success]
verify_jwt = false

[functions.checkout-cancel]
verify_jwt = false

[functions.redeem-voucher]
verify_jwt = false

[functions.promotion-status]
verify_jwt = false
