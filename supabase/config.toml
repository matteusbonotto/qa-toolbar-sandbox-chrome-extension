project_id = "qa-toolbar-sandbox"

[auth]
site_url = "https://matteusbonotto.github.io/qa-toolbar-sandbox-chrome-extension/"
jwt_expiry = 3600
additional_redirect_urls = [
  "https://matteusbonotto.github.io/qa-toolbar-sandbox-chrome-extension/",
  "https://matteusbonotto.github.io/qa-toolbar-sandbox-chrome-extension/admin/",
  "http://localhost:5173/",
  "http://localhost:5174/"
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

# Routes every Supabase Auth email (recovery, confirmations, etc.) through Resend instead of
# Supabase's own default mailer — lifts its very low built-in rate limit and lets the template
# below actually control how these emails look. `pass` is read from the RESEND_API_KEY
# environment variable at `supabase config push` time (see .env) — never hardcoded here, since
# this file is committed to git. Sender stays on Resend's shared onboarding@resend.dev domain
# until a real domain is verified in the Resend dashboard; until then, Resend only delivers to
# the account's own registered email address, not to arbitrary real users.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "onboarding@resend.dev"
sender_name = "QA Toolbar Sandbox"

[auth.email.template.recovery]
subject = "Redefina sua senha — QA Toolbar Sandbox"
content_path = "./supabase/templates/recovery.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage.vector]
enabled = false

[functions.checkout-create-session]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.voucher-redeem]
verify_jwt = false

[functions.referral-track]
verify_jwt = false

[functions.keep-alive]
verify_jwt = false

[functions.access-status]
verify_jwt = false

[functions.auth-sign-in]
verify_jwt = false

[functions.auth-refresh]
verify_jwt = false

[functions.auth-recover-password]
verify_jwt = false

[functions.admin-email-otp]
verify_jwt = false
