project_id = "qa-toolbar-sandbox"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 17

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[functions.stripe-webhook]
verify_jwt = false

[functions.auth-sign-in]
verify_jwt = false

[functions.auth-refresh]
verify_jwt = false

[functions.auth-sign-up]
verify_jwt = false

[functions.keep-alive]
verify_jwt = false

[functions.checkout-success]
verify_jwt = false

[functions.checkout-cancel]
verify_jwt = false
