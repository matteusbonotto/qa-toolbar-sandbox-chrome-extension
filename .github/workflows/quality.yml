name: Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject secrets and private artifacts before installing dependencies
        run: node scripts/check-repository.mjs
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --omit=dev --audit-level=critical
      - name: Record full development-tool audit
        continue-on-error: true
        run: npm audit --audit-level=high
