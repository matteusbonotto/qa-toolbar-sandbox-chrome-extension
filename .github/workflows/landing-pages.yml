name: Publish landing page

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "apps/admin/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/landing-pages.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w @qts/landing
      - run: npm run test -w @qts/landing
      - run: npm run typecheck -w @qts/admin
      - run: npm run test -w @qts/admin
      - name: Require browser-safe backend configuration
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          case "$VITE_SUPABASE_URL" in https://*.supabase.co) ;; *) exit 1 ;; esac
      - uses: actions/configure-pages@v6
      - name: Build landing with the repository base path
        run: npm run build -w @qts/landing -- --base "/${{ github.event.repository.name }}/"
      - name: Build founder admin under the same Pages site
        run: npm run build -w @qts/admin -- --base "/${{ github.event.repository.name }}/admin/"
      - name: Add founder admin to the landing artifact
        run: |
          mkdir -p apps/landing/dist/admin
          cp -R apps/admin/dist/. apps/landing/dist/admin/
      - name: Package the manual-install (sideload) extension zip for the download fallback
        run: npm run package:extension:sideload -- --output=apps/landing/dist/qa-toolbar-sandbox-extension.zip
      - name: Add SPA fallback so deep links survive a direct load/reload
        run: cp apps/landing/dist/index.html apps/landing/dist/404.html
      - name: Give static-checked routes a real 200 response (not just the 404-status SPA fallback)
        run: |
          for route in privacidade redefinir-senha; do
            mkdir -p "apps/landing/dist/$route"
            cp apps/landing/dist/index.html "apps/landing/dist/$route/index.html"
          done
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
