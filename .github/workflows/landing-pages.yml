name: Publish landing page

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/landing-pages.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w @qts/landing
      - run: npm run test -w @qts/landing
      - uses: actions/configure-pages@v6
      - name: Build landing with the repository base path
        run: npm run build -w @qts/landing -- --base "/${{ github.event.repository.name }}/"
      - name: Add SPA fallback so deep links (e.g. /privacidade) survive a direct load/reload
        run: cp apps/landing/dist/index.html apps/landing/dist/404.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
