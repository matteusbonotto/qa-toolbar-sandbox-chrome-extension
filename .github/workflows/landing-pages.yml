name: Publish landing page

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/landing-pages.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require browser-safe commerce configuration
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
      - run: npm run typecheck
      - run: npm run test
      - uses: actions/configure-pages@v6
      - name: Build landing with the repository base path
        run: npm run build -w @qts/landing -- --base "/${{ github.event.repository.name }}/"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
