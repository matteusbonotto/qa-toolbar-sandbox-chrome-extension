name: Build Chrome Web Store package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      WXT_PUBLIC_OFFLINE_LICENSE_PUBLIC_JWK: ${{ vars.WXT_PUBLIC_OFFLINE_LICENSE_PUBLIC_JWK }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:chrome
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-web-store-package
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
