name: Build Chrome Web Store package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify and build the whitelisted Chrome Web Store package
        run: node scripts/package-extension.mjs --output=artifacts/qa-toolbar-sandbox-extension.zip
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-web-store-package
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
