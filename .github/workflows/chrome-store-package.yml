name: Build Chrome Web Store package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Zip the unbundled extension for Chrome Web Store submission
        run: |
          mkdir -p artifacts
          cd apps/extension
          zip -r ../../artifacts/qa-toolbar-sandbox-extension.zip . -x "*.DS_Store"
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-web-store-package
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
